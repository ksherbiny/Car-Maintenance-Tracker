<div class="page page--analysis" id="page-analysis">

  <!-- Stat tiles -->
  <div class="stat-tiles" id="analysis-tiles">
    <div class="stat-tile">
      <div class="stat-tile__val" id="tile-avg-year">—</div>
      <div class="stat-tile__lbl">Avg. Annual Spend</div>
    </div>
    <div class="stat-tile">
      <div class="stat-tile__val" id="tile-cost-per-km">—</div>
      <div class="stat-tile__lbl">Cost / 1,000 km</div>
    </div>
    <div class="stat-tile">
      <div class="stat-tile__val" id="tile-top-cat">—</div>
      <div class="stat-tile__lbl">Top Spend Category</div>
    </div>
    <div class="stat-tile">
      <div class="stat-tile__val" id="tile-freq-cat">—</div>
      <div class="stat-tile__lbl">Most Frequent Category</div>
    </div>
  </div>

  <!-- Chart 1: Yearly spending -->
  <div class="chart-card">
    <div class="chart-title">📊 Yearly Spending (2010 – Present)</div>
    <div class="chart-wrap chart-wrap--tall">
      <canvas id="chart-yearly"></canvas>
    </div>
  </div>

  <!-- Chart 2: Category doughnut -->
  <div class="chart-card">
    <div class="chart-title">🍩 Category Breakdown</div>
    <div class="chart-wrap">
      <canvas id="chart-category"></canvas>
    </div>
  </div>

  <!-- Chart 3: Cost vs Odometer -->
  <div class="chart-card">
    <div class="chart-title">📉 Cost vs Odometer</div>
    <div class="chart-wrap chart-wrap--tall">
      <canvas id="chart-km"></canvas>
    </div>
  </div>

  <!-- Chart 4: Monthly (current year) -->
  <div class="chart-card">
    <div class="chart-title">🗓 Monthly Spending (<span id="chart-monthly-year"></span>)</div>
    <div class="chart-wrap">
      <canvas id="chart-monthly"></canvas>
    </div>
  </div>

  <!-- Chart 5: Top 5 expenses -->
  <div class="chart-card">
    <div class="chart-title">🏆 Top 5 Expenses</div>
    <div class="chart-wrap chart-wrap--tall">
      <canvas id="chart-top"></canvas>
    </div>
  </div>

</div>
