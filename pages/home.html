<div class="page page--home" id="page-home">

  <!-- Sync status -->
  <div class="section-header mb-8">
    <span class="sync-badge sync-badge--offline" id="sync-badge">⬤ Offline</span>
  </div>

  <!-- Summary cards -->
  <div class="stat-card stat-card--full card mb-12" id="stat-total">
    <div class="stat-card__icon">💰</div>
    <div class="stat-card__label">Total Spent (All Time)</div>
    <div class="stat-card__value" id="val-total">Loading…</div>
  </div>

  <div class="stats-grid">
    <div class="stat-card">
      <div class="stat-card__icon">📅</div>
      <div class="stat-card__label">This Year</div>
      <div class="stat-card__value" id="val-year">—</div>
    </div>
    <div class="stat-card">
      <div class="stat-card__icon">🗓</div>
      <div class="stat-card__label">This Month</div>
      <div class="stat-card__value" id="val-month">—</div>
    </div>
    <div class="stat-card">
      <div class="stat-card__icon">🛢</div>
      <div class="stat-card__label">Last Oil Change</div>
      <div class="stat-card__value" id="val-oil">—</div>
      <div class="stat-card__sub" id="val-oil-km"></div>
    </div>
    <div class="stat-card">
      <div class="stat-card__icon">🚗</div>
      <div class="stat-card__label">Odometer</div>
      <div class="stat-card__value" id="val-km">—</div>
    </div>
  </div>

  <!-- Mini yearly chart -->
  <div class="chart-card">
    <div class="chart-title">Last 5 Years</div>
    <div class="chart-wrap chart-wrap--short">
      <canvas id="chart-home-yearly"></canvas>
    </div>
  </div>

  <!-- Recent entries -->
  <div class="card">
    <div class="section-header">
      <span class="section-title">Recent Entries</span>
      <button class="section-link" data-nav="history">View All</button>
    </div>
    <div id="recent-list">
      <div class="skeleton" style="height:40px;margin-bottom:8px;"></div>
      <div class="skeleton" style="height:40px;margin-bottom:8px;"></div>
      <div class="skeleton" style="height:40px;"></div>
    </div>
  </div>

</div>
