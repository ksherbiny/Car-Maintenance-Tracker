<div class="page page--history" id="page-history">

  <!-- Sticky search + filters -->
  <div class="search-bar">
    <div class="ptr-hint" id="ptr-hint">↓ اسحب للمزامنة</div>
    <div class="search-input-wrap">
      <span class="search-icon">🔍</span>
      <input
        class="search-input"
        type="search"
        id="history-search"
        placeholder="ابحث عن بند، تاريخ، فئة…"
        dir="auto"
        autocomplete="off"
      />
    </div>
    <div class="filter-chips" id="filter-chips">
      <!-- populated by JS -->
    </div>
  </div>

  <!-- Results count -->
  <div class="section-header mt-8 mb-8">
    <span class="section-title" id="history-count">جاري التحميل…</span>
    <span class="text-muted" style="font-size:0.75rem;" id="history-total-shown"></span>
  </div>

  <!-- Entry list -->
  <div id="history-list">
    <!-- Entry cards injected by JS -->
  </div>

  <!-- Load more -->
  <div id="load-more-wrap" class="text-center mt-12 hidden">
    <button class="btn btn--secondary" id="btn-load-more">تحميل المزيد</button>
  </div>

  <!-- Empty state -->
  <div id="history-empty" class="empty-state hidden">
    <div class="empty-state__icon">📭</div>
    <div class="empty-state__text">لا توجد سجلات مطابقة</div>
  </div>

</div>
