<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 200" fill="none">
  <!-- Background gradient -->
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#e6f2fb"/>
      <stop offset="100%" stop-color="#cce4f6"/>
    </linearGradient>
    <linearGradient id="carBody" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4da6e0"/>
      <stop offset="100%" stop-color="#0070C0"/>
    </linearGradient>
    <linearGradient id="carRoof" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#5ab5eb"/>
      <stop offset="100%" stop-color="#1a8fd1"/>
    </linearGradient>
  </defs>

  <rect width="400" height="200" fill="url(#bgGrad)" rx="16"/>

  <!-- Ground shadow -->
  <ellipse cx="230" cy="178" rx="130" ry="8" fill="rgba(0,112,192,0.10)"/>

  <!-- ── CAR ── -->
  <!-- Car body -->
  <rect x="110" y="130" width="230" height="42" rx="10" fill="url(#carBody)"/>
  <!-- Car roof -->
  <path d="M160 130 Q175 95 210 90 H295 Q325 95 335 130Z" fill="url(#carRoof)"/>
  <!-- Windshield -->
  <path d="M215 93 Q220 100 218 128 H285 Q290 100 290 93Z" fill="rgba(255,255,255,0.55)" rx="4"/>
  <!-- Side windows -->
  <rect x="170" y="103" width="38" height="26" rx="5" fill="rgba(255,255,255,0.45)"/>
  <!-- Door line -->
  <line x1="218" y1="130" x2="218" y2="172" stroke="rgba(255,255,255,0.3)" stroke-width="1.5"/>
  <line x1="285" y1="130" x2="285" y2="172" stroke="rgba(255,255,255,0.3)" stroke-width="1.5"/>
  <!-- Door handle -->
  <rect x="240" y="148" width="18" height="4" rx="2" fill="rgba(255,255,255,0.5)"/>
  <rect x="295" y="148" width="18" height="4" rx="2" fill="rgba(255,255,255,0.5)"/>
  <!-- Front bumper detail -->
  <rect x="110" y="155" width="40" height="17" rx="5" fill="#005a9e"/>
  <rect x="114" y="159" width="14" height="8" rx="2" fill="#ffe066"/>
  <!-- Tail light -->
  <rect x="322" y="155" width="18" height="12" rx="3" fill="#ff6b6b"/>
  <!-- Wheels -->
  <circle cx="170" cy="172" r="18" fill="#1a1a2e"/>
  <circle cx="170" cy="172" r="11" fill="#3a3a5e"/>
  <circle cx="170" cy="172" r="5" fill="#aac8e8"/>
  <circle cx="305" cy="172" r="18" fill="#1a1a2e"/>
  <circle cx="305" cy="172" r="11" fill="#3a3a5e"/>
  <circle cx="305" cy="172" r="5" fill="#aac8e8"/>
  <!-- Wheel arches -->
  <path d="M148 155 Q170 142 192 155" stroke="#005a9e" stroke-width="3" fill="none"/>
  <path d="M283 155 Q305 142 327 155" stroke="#005a9e" stroke-width="3" fill="none"/>

  <!-- ── MECHANIC ── -->
  <!-- Legs -->
  <rect x="76" y="152" width="12" height="24" rx="5" fill="#1a5276"/>
  <rect x="92" y="152" width="12" height="24" rx="5" fill="#1a5276"/>
  <!-- Shoes -->
  <rect x="73" y="172" width="16" height="8" rx="4" fill="#1a1a2e"/>
  <rect x="90" y="172" width="16" height="8" rx="4" fill="#1a1a2e"/>
  <!-- Body / overalls -->
  <rect x="70" y="110" width="42" height="46" rx="10" fill="#2980b9"/>
  <!-- Overall straps -->
  <rect x="77" y="110" width="8" height="20" rx="3" fill="#1a6fa0"/>
  <rect x="97" y="110" width="8" height="20" rx="3" fill="#1a6fa0"/>
  <!-- Pocket -->
  <rect x="78" y="130" width="14" height="11" rx="3" fill="#1a6fa0"/>
  <!-- Arms -->
  <!-- Left arm (raised, holding wrench) -->
  <path d="M70 120 Q50 110 45 100" stroke="#f0c27f" stroke-width="11" stroke-linecap="round" fill="none"/>
  <!-- Right arm (down) -->
  <path d="M112 120 Q118 130 116 145" stroke="#f0c27f" stroke-width="11" stroke-linecap="round" fill="none"/>
  <!-- Neck -->
  <rect x="84" y="100" width="14" height="14" rx="5" fill="#f0c27f"/>
  <!-- Head -->
  <circle cx="91" cy="88" r="22" fill="#f5d5a0"/>
  <!-- Hair -->
  <path d="M70 82 Q91 62 112 82 Q108 70 91 67 Q74 70 70 82Z" fill="#5d3a1a"/>
  <!-- Face: eyes -->
  <circle cx="84" cy="87" r="3" fill="#1a1a2e"/>
  <circle cx="98" cy="87" r="3" fill="#1a1a2e"/>
  <circle cx="85" cy="86" r="1.2" fill="white"/>
  <circle cx="99" cy="86" r="1.2" fill="white"/>
  <!-- Smile -->
  <path d="M84 95 Q91 101 98 95" stroke="#c0784a" stroke-width="2" fill="none" stroke-linecap="round"/>
  <!-- Cap -->
  <path d="M68 80 Q91 60 114 80 Q108 72 91 70 Q74 72 68 80Z" fill="#0070C0"/>
  <rect x="64" y="79" width="54" height="8" rx="4" fill="#005a9e"/>
  <!-- Cap brim -->
  <rect x="62" y="82" width="20" height="5" rx="2.5" fill="#004a85"/>
  <!-- Wrench -->
  <g transform="translate(30,82) rotate(-30)">
    <rect x="0" y="-3" width="22" height="6" rx="3" fill="#7f8c8d"/>
    <circle cx="0" cy="0" r="7" fill="none" stroke="#7f8c8d" stroke-width="4"/>
    <circle cx="22" cy="0" r="5" fill="none" stroke="#7f8c8d" stroke-width="4"/>
  </g>

  <!-- ── TEXT ── -->
  <text x="200" y="40" font-family="'Cairo','Candara',sans-serif" font-size="15" font-weight="700" fill="#0070C0" text-anchor="middle">Car Maintenance Tracker</text>
  <text x="200" y="60" font-family="'Cairo','Candara',sans-serif" font-size="10" fill="#6b7280" text-anchor="middle">Your complete service history in one place</text>
</svg>
