<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0070C0" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="CarTracker" />
  <meta name="description" content="Car Maintenance Tracker — track your car history and costs" />

  <title>Car Maintenance Tracker</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icons/icon-192.png" />
  <link rel="icon" type="image/png" href="icons/icon-192.png" />

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700&display=swap" rel="stylesheet" />

  <!-- CDN deps -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/localforage/1.10.0/localforage.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>

  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>

  <!-- Loading overlay -->
  <div id="loading-overlay" class="loading-overlay" aria-hidden="true">
    <div class="loading-spinner"></div>
    <p class="loading-text">جاري التحميل…</p>
  </div>

  <!-- App wrapper -->
  <div id="app" class="app">

    <!-- Top bar -->
    <header class="top-bar" id="top-bar">
      <span class="top-bar__title" id="page-title">الرئيسية</span>
      <button class="top-bar__settings-btn" id="settings-btn" aria-label="الإعدادات" title="الإعدادات">⚙️</button>
    </header>

    <!-- Page container -->
    <main id="page-container" class="page-container" role="main">
      <!-- Pages injected here by router -->
    </main>

    <!-- Bottom navigation -->
    <nav class="bottom-nav" role="navigation" aria-label="التنقل الرئيسي">
      <button class="nav-item active" data-page="home" aria-label="الرئيسية">
        <span class="nav-icon">🏠</span>
        <span class="nav-label">الرئيسية</span>
      </button>
      <button class="nav-item" data-page="add" aria-label="إضافة">
        <span class="nav-icon nav-icon--add">+</span>
        <span class="nav-label">إضافة</span>
      </button>
      <button class="nav-item" data-page="history" aria-label="السجل">
        <span class="nav-icon">📋</span>
        <span class="nav-label">السجل</span>
      </button>
      <button class="nav-item" data-page="analysis" aria-label="التحليل">
        <span class="nav-icon">📈</span>
        <span class="nav-label">التحليل</span>
      </button>
    </nav>

  </div>

  <!-- Settings modal -->
  <div id="settings-modal" class="modal" role="dialog" aria-modal="true" aria-label="الإعدادات" hidden>
    <div class="modal__backdrop" id="settings-backdrop"></div>
    <div class="modal__sheet">
      <div class="modal__header">
        <h2 class="modal__title">الإعدادات</h2>
        <button class="modal__close" id="settings-close" aria-label="إغلاق">✕</button>
      </div>
      <div class="modal__body">
        <p class="settings-section-title">مزامنة Google Sheets</p>
        <label class="settings-label" for="input-client-id">Client ID</label>
        <input class="settings-input" type="text" id="input-client-id" placeholder="xxxx.apps.googleusercontent.com" />
        <label class="settings-label" for="input-sheet-id">Sheet ID</label>
        <input class="settings-input" type="text" id="input-sheet-id" placeholder="1BxiMVs0XRA5nFMdKvBdBZjgmUUqptlbs74OgVE2upms" />
        <button class="btn btn--primary btn--full" id="btn-connect-sheets">🔗 ربط Google Sheets</button>
        <p class="settings-hint">
          احتاج إلى: Google Cloud Project → Sheets API → OAuth 2.0 Client ID.<br/>
          أضف عنوان GitHub Pages كـ Authorized redirect URI.
        </p>
        <hr class="settings-divider" />
        <button class="btn btn--danger btn--full" id="btn-reset-data">🗑 إعادة تعيين البيانات</button>
      </div>
    </div>
  </div>

  <!-- Toast notification -->
  <div id="toast" class="toast" role="status" aria-live="polite"></div>

  <script type="module" src="js/app.js"></script>

  <script>
    // Register service worker
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('service-worker.js', { scope: '/car-maintenance-tracker/' })
          .catch(() => {/* SW not critical */});
      });
    }
  </script>
</body>
</html>
